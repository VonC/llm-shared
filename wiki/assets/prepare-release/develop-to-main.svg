<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 469">
<title id="title">Release every feature validated on develop</title><desc id="desc">Develop is never rebased; one merge selects its complete tested history.</desc>
<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="context-stroke"/></marker></defs>
<style>
  text { font-family: Inter, Segoe UI, sans-serif; }
  .title { font-size: 21px; font-weight: 700; fill: #172033; }
  .lane-label { font-size: 14px; font-weight: 700; }
  .edge { fill: none; stroke-width: 3; opacity: .88; }
  .edge.merge { stroke-width: 5; }
  .edge.rebase { stroke-width: 4; stroke-dasharray: 9 7; }
  .edge-label { font-size: 12px; text-anchor: middle; fill: #374151; }
  .commit { stroke: #fff; stroke-width: 3; }
  .commit-label { font-size: 12px; font-weight: 700; text-anchor: middle; fill: #172033; }
  .caption { font-size: 13px; fill: #4b5563; }
  .legend { font-size: 12px; fill: #374151; }
</style>
<rect width="100%" height="100%" rx="12" fill="#f8fafc" stroke="#d7deea"/>
<text class="title" x="18" y="32">Release every feature validated on develop</text>
<text class="lane-label" x="18" y="130" fill="#2563eb">main (release)</text><text class="lane-label" x="18" y="260" fill="#d97706">develop (integration)</text><text class="lane-label" x="18" y="380" fill="#15803d">validated topics</text><line class="edge history" x1="180" y1="125" x2="300" y2="255" stroke="#2563eb"/><line class="edge history" x1="300" y1="255" x2="430" y2="375" stroke="#d97706"/><line class="edge history" x1="300" y1="255" x2="570" y2="255" stroke="#d97706"/><line class="edge merge" x1="430" y1="375" x2="570" y2="255" stroke="#d97706" marker-end="url(#arrow)"/><text class="edge-label" x="500" y="305">--no-ff</text><line class="edge history" x1="570" y1="255" x2="660" y2="375" stroke="#d97706"/><line class="edge history" x1="570" y1="255" x2="800" y2="255" stroke="#d97706"/><line class="edge merge" x1="660" y1="375" x2="800" y2="255" stroke="#d97706" marker-end="url(#arrow)"/><text class="edge-label" x="730" y="305">--no-ff</text><line class="edge history" x1="180" y1="125" x2="1010" y2="125" stroke="#2563eb"/><line class="edge merge" x1="800" y1="255" x2="1010" y2="125" stroke="#2563eb" marker-end="url(#arrow)"/><text class="edge-label" x="905" y="180">merge develop --no-ff</text><circle class="commit" cx="180" cy="125" r="12" fill="#2563eb"/><text class="commit-label" x="180" y="106">M0</text><circle class="commit" cx="300" cy="255" r="12" fill="#d97706"/><text class="commit-label" x="300" y="236">D0</text><circle class="commit" cx="430" cy="375" r="12" fill="#15803d"/><text class="commit-label" x="430" y="356">A</text><circle class="commit" cx="570" cy="255" r="12" fill="#d97706"/><text class="commit-label" x="570" y="236">merge A</text><circle class="commit" cx="660" cy="375" r="12" fill="#15803d"/><text class="commit-label" x="660" y="356">B</text><circle class="commit" cx="800" cy="255" r="12" fill="#d97706"/><text class="commit-label" x="800" y="236">merge B</text><circle class="commit" cx="1010" cy="125" r="12" fill="#2563eb"/><text class="commit-label" x="1010" y="106">merge develop</text>
<line class="edge rebase" x1="20" y1="411" x2="82" y2="411" stroke="#7c3aed" marker-end="url(#arrow)"/>
<text class="legend" x="94" y="416">dashed = rebase/replay (new commit identities)</text>
<line class="edge merge" x1="440" y1="411" x2="502" y2="411" stroke="#2563eb" marker-end="url(#arrow)"/>
<text class="legend" x="514" y="416">solid arrow = merge --no-ff</text>
<text class="caption" x="18" y="447">Develop is never rebased; one merge selects its complete tested history.</text>
</svg>
