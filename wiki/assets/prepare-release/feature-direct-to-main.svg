<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 444">
<title id="title">Select one stale feature directly for main</title><desc id="desc">A temporary copy is rebased; the original feature branch is unchanged.</desc>
<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="context-stroke"/></marker></defs>
<style>
  text { font-family: Inter, Segoe UI, sans-serif; }
  .title { font-size: 21px; font-weight: 700; fill: #172033; }
  .lane-label { font-size: 14px; font-weight: 700; }
  .edge { fill: none; stroke-width: 3; opacity: .88; }
  .edge.merge { stroke-width: 5; }
  .edge.rebase { stroke-width: 4; stroke-dasharray: 9 7; }
  .edge-label { font-size: 12px; text-anchor: middle; fill: #374151; }
  .commit { stroke: #fff; stroke-width: 3; }
  .commit-label { font-size: 12px; font-weight: 700; text-anchor: middle; fill: #172033; }
  .caption { font-size: 13px; fill: #4b5563; }
  .legend { font-size: 12px; fill: #374151; }
</style>
<rect width="100%" height="100%" rx="12" fill="#f8fafc" stroke="#d7deea"/>
<text class="title" x="18" y="32">Select one stale feature directly for main</text>
<text class="lane-label" x="18" y="135" fill="#2563eb">main (release)</text><text class="lane-label" x="18" y="255" fill="#15803d">feature/A</text><text class="lane-label" x="18" y="355" fill="#7c3aed">promotion copy</text><line class="edge history" x1="190" y1="130" x2="470" y2="130" stroke="#2563eb"/><line class="edge history" x1="190" y1="130" x2="390" y2="250" stroke="#2563eb"/><line class="edge history" x1="390" y1="250" x2="580" y2="250" stroke="#15803d"/><line class="edge rebase" x1="390" y1="250" x2="650" y2="350" stroke="#7c3aed" marker-end="url(#arrow)"/><text class="edge-label" x="520" y="290">rebase exact range onto main</text><line class="edge history" x1="470" y1="130" x2="650" y2="350" stroke="#2563eb"/><line class="edge history" x1="650" y1="350" x2="800" y2="350" stroke="#7c3aed"/><line class="edge history" x1="470" y1="130" x2="990" y2="130" stroke="#2563eb"/><line class="edge merge" x1="800" y1="350" x2="990" y2="130" stroke="#2563eb" marker-end="url(#arrow)"/><text class="edge-label" x="895" y="230">merge --no-ff</text><circle class="commit" cx="190" cy="130" r="12" fill="#2563eb"/><text class="commit-label" x="190" y="111">M0</text><circle class="commit" cx="470" cy="130" r="12" fill="#2563eb"/><text class="commit-label" x="470" y="111">M1</text><circle class="commit" cx="390" cy="250" r="12" fill="#15803d"/><text class="commit-label" x="390" y="231">A1</text><circle class="commit" cx="580" cy="250" r="12" fill="#15803d"/><text class="commit-label" x="580" y="231">A2</text><circle class="commit" cx="650" cy="350" r="12" fill="#7c3aed"/><text class="commit-label" x="650" y="331">A1&#x27;</text><circle class="commit" cx="800" cy="350" r="12" fill="#7c3aed"/><text class="commit-label" x="800" y="331">A2&#x27;</text><circle class="commit" cx="990" cy="130" r="12" fill="#2563eb"/><text class="commit-label" x="990" y="111">merge A</text>
<line class="edge rebase" x1="20" y1="386" x2="82" y2="386" stroke="#7c3aed" marker-end="url(#arrow)"/>
<text class="legend" x="94" y="391">dashed = rebase/replay (new commit identities)</text>
<line class="edge merge" x1="440" y1="386" x2="502" y2="386" stroke="#2563eb" marker-end="url(#arrow)"/>
<text class="legend" x="514" y="391">solid arrow = merge --no-ff</text>
<text class="caption" x="18" y="422">A temporary copy is rebased; the original feature branch is unchanged.</text>
</svg>
